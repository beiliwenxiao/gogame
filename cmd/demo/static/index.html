<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修罗斗场 - 多人对战 Demo</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* html5-mmrpg-game 引擎 UI 覆盖层样式 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #tutorial-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            border: 3px solid #2196F3;
            pointer-events: auto;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            animation: fadeIn 0.3s ease-in;
            z-index: 30;
        }

        #tips-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            border: 3px solid #4CAF50;
            pointer-events: none;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            animation: fadeIn 0.3s ease-in;
            z-index: 30;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        #tutorial-panel h3 { color: #2196F3; margin-bottom: 15px; font-size: 20px; }
        #tips-panel h3 { color: #4CAF50; margin-bottom: 15px; font-size: 20px; }
        #tutorial-panel p, #tips-panel p { font-size: 18px; line-height: 1.6; color: #ffffff; margin-bottom: 20px; }

        #tutorial-panel .key, #tips-panel .key {
            display: inline-block;
            background: #2196F3;
            color: #000;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            margin: 0 3px;
        }

        #tutorial-panel .tutorial-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        #tutorial-panel button {
            padding: 10px 20px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        #tutorial-panel button:hover { background: #45a049; transform: translateY(-2px); }

        #debug-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 30;
        }

        #debug-panel div { margin: 2px 0; }

        /* 竞技场页面使用引擎Canvas时的样式覆盖 */
        #page-arena.engine-mode {
            position: relative;
            flex-direction: column;
        }

        #page-arena.engine-mode #arena-canvas {
            display: none !important;
        }

        #engine-canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #engineCanvas {
            display: block;
            background-color: #1a1a2e;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #loading-overlay h1 { color: #ff6666; margin-bottom: 20px; }
        .progress-bar { width: 300px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill-bar { height: 100%; background: linear-gradient(90deg, #cc3333, #ff6666); width: 0%; transition: width 0.3s; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
  <!-- 登录/注册页 -->
  <div id="page-auth" class="page active">
    <div class="auth-box">
      <h1>⚔️ 修罗斗场</h1>
      <p class="subtitle">多人实时对战</p>
      <div class="form-group">
        <input id="auth-user" type="text" placeholder="用户名 (至少2字符)" maxlength="20">
      </div>
      <div class="form-group">
        <input id="auth-pass" type="password" placeholder="密码 (至少3字符)" maxlength="30">
      </div>
      <div class="btn-row">
        <button id="btn-login" class="btn">登录</button>
        <button id="btn-register" class="btn btn-secondary">注册</button>
      </div>
      <div class="btn-row" style="margin-top:8px;">
        <button id="btn-reconnect" class="btn btn-secondary" style="width:100%;">🔌 连接服务器</button>
      </div>
      <div id="auth-msg" class="msg"></div>
    </div>
  </div>

  <!-- 角色创建页 -->
  <div id="page-create" class="page">
    <div class="create-box">
      <h2>创建角色</h2>
      <div class="form-group">
        <input id="char-name" type="text" placeholder="角色名称" maxlength="12">
      </div>
      <div class="class-select">
        <div class="class-card selected" data-class="warrior">
          <div class="class-icon">🗡️</div>
          <div class="class-name">战士</div>
          <div class="class-desc">近战高防，猛击旋风</div>
        </div>
        <div class="class-card" data-class="archer">
          <div class="class-icon">🏹</div>
          <div class="class-name">弓箭手</div>
          <div class="class-desc">远程高暴击，灵活</div>
        </div>
      </div>
      <button id="btn-create" class="btn">创建角色</button>
      <div id="create-msg" class="msg"></div>
    </div>
  </div>

  <!-- 整备页 -->
  <div id="page-lobby" class="page">
    <div class="lobby-box">
      <div class="lobby-header">
        <h2 id="lobby-title">整备</h2>
        <button id="btn-enter-arena" class="btn btn-danger">⚔️ 进入修罗斗场</button>
      </div>
      <div class="lobby-content">
        <div class="char-panel">
          <h3>角色信息</h3>
          <div id="char-stats"></div>
        </div>
        <div class="equip-panel">
          <h3>装备栏</h3>
          <div id="equip-slots"></div>
        </div>
        <div class="equip-list-panel">
          <h3>可用装备</h3>
          <div id="equip-list"></div>
        </div>
        <div class="skill-panel">
          <h3>技能列表</h3>
          <div id="skill-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 竞技场页（引擎模式） -->
  <div id="page-arena" class="page engine-mode">
    <div class="arena-hud">
      <div class="hud-left">
        <div class="hud-orb hp-orb">
          <div class="hud-orb-bg"></div>
          <div class="hud-orb-fill" style="height:100%"></div>
          <div class="hud-orb-border"></div>
          <div class="hud-orb-text">100</div>
        </div>
        <div id="hud-hp-bar" class="hud-bar">
          <div class="bar-fill hp-fill"></div>
          <span class="bar-text">HP</span>
        </div>
        <div class="hud-orb mp-orb">
          <div class="hud-orb-bg"></div>
          <div class="hud-orb-fill" style="height:100%"></div>
          <div class="hud-orb-border"></div>
          <div class="hud-orb-text">100</div>
        </div>
        <div id="hud-mp-bar" class="hud-bar">
          <div class="bar-fill mp-fill"></div>
          <span class="bar-text">MP</span>
        </div>
      </div>
      <div class="hud-center">
        <span id="hud-name"></span>
      </div>
      <div class="hud-right">
        <button id="btn-leave-arena" class="btn btn-small">离开</button>
      </div>
    </div>

    <!-- 引擎 Canvas 容器 -->
    <div id="engine-canvas-container">
      <canvas id="engineCanvas" width="800" height="600"></canvas>
      <div id="ui-overlay">
        <div id="tutorial-panel" class="hidden">
          <h3 id="tutorial-title">教程</h3>
          <p id="tutorial-text">教程内容</p>
          <div class="tutorial-buttons">
            <button id="tutorial-prev-btn" style="display: none;">上一步</button>
            <button id="tutorial-next-btn">下一步</button>
          </div>
        </div>
        <div id="tips-panel" class="hidden">
          <h3 id="tips-title">提示</h3>
          <p id="tips-text">提示内容</p>
        </div>
        <div id="debug-panel" class="hidden">
          <div>FPS: <span id="fps">60</span></div>
          <div>位置: <span id="position">0, 0</span></div>
          <div>玩家数: <span id="player-count">0</span></div>
        </div>
      </div>

      <!-- 加载覆盖层 -->
      <div id="loading-overlay" class="hidden">
        <h1>⚔️ 修罗斗场</h1>
        <h2>正在进入竞技场...</h2>
        <div class="progress-bar">
          <div class="progress-fill-bar" id="progress-fill"></div>
        </div>
        <p id="loading-text">加载中...</p>
      </div>
    </div>

    <!-- 旧 Canvas（隐藏） -->
    <canvas id="arena-canvas" style="display:none;"></canvas>
    <div id="skill-bar"></div>
    <div id="chat-box">
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="输入消息..." maxlength="100">
        <button id="btn-chat-send" class="btn btn-small">发送</button>
      </div>
    </div>
  </div>

  <script src="js/ws.js"></script>
  <script src="js/arena.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
